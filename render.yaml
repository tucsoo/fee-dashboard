# Render.com Blueprint — fee-dashboard
# This file tells Render how to build and deploy the service

services:
  - type: web
    name: fee-dashboard
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: fee-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
